<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow API | Production</title>
    <style>
        :root {
            --brand: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        p {
            color: var(--muted);
            font-size: 0.9375rem;
            line-height: 1.6;
        }

        .status {
            font-size: 0.75rem;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 0.75rem;
            margin: 2rem 0;
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem;
            font-family: monospace;
            font-size: 0.75rem;
            text-align: center;
            border-radius: 8px;
            color: var(--brand);
        }

        .btn {
            display: block;
            width: 100%;
            text-align: center;
            background: var(--brand);
            color: white;
            text-decoration: none;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1.5rem;">
            <h1>🛰️ TaskFlow <span style="color: var(--brand)">API</span></h1>
            <span class="status">Live</span>
        </div>
        <p>Enterprise-grade task management backbone. Powering real-time AI extraction, workload balancing, and
            cross-platform synchronization.</p>

        <div class="grid">
            <span class="tag">/api/auth</span>
            <span class="tag">/api/tasks</span>
            <span class="tag">/api/analytics</span>
            <span class="tag">/api/integrations</span>
        </div>

        <a href="#" class="btn">Launch Dashboard</a>
        <footer>System v2.0 • Secured by TaskFlow Armor</footer>
    </div>
</body>

</html>
